appId: host.exp.exponent
env:
  EXPO_DEEPLINK: ${EXPO_DEEPLINK || "exp://10.0.2.2:8081"}
---
- runFlow:
    file: subflows/open-expo-link.android.yaml
    env:
      EXPO_DEEPLINK: ${EXPO_DEEPLINK}
- assertVisible: "Daily setup"
- assertVisible: "Build your brief"
- tapOn: "Continue"
- runFlow:
    file: subflows/dismiss-expo-go-overlays.android.yaml
- assertVisible: "A compact scan of what matters today"
- assertVisible: "Top five papers"
- tapOn:
    text: "^Open$"
    index: 0
- assertVisible: "Why it matters"
- assertVisible: "Abstract snapshot"
- tapOn: "Back"
- tapOn:
    text: "^Save$"
    index: 0
- tapOn:
    text: "^Saved$"
    index: 1
- assertVisible: "Papers worth revisiting"
- assertNotVisible: "No saved papers yet"
- assertVisible: "Remove"
- runFlow:
    file: subflows/open-expo-link.android.yaml
    env:
      EXPO_DEEPLINK: ${EXPO_DEEPLINK}
- assertNotVisible: "Daily setup"
- tapOn:
    text: "^Saved$"
    index: 1
- assertVisible: "Papers worth revisiting"
- assertNotVisible: "No saved papers yet"